name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          # For a project page (USERNAME.github.io/REPO/), set this to /REPO
          # For a custom domain or user/org page, set this to empty (default)
          NEXT_PUBLIC_BASE_PATH: ${{ secrets.NEXT_PUBLIC_BASE_PATH }}
        run: npm run build

      - name: Add 404.html for SPA routing
        run: cp out/index.html out/404.html

      - name: Add .nojekyll file
        # .nojekyll tells GitHub Pages NOT to process the site with Jekyll.
        # This prevents files/folders starting with _ from being ignored.
        run: touch out/.nojekyll

      - name: Add CNAME for custom domain (if configured)
        # To use a custom domain (e.g. unocafe.com):
        #   1. Go to repo Settings → Pages → Custom domain → enter your domain
        #   2. (OR) create a GitHub secret named CUSTOM_DOMAIN with your domain
        #   3. Add a CNAME DNS record pointing to USERNAME.github.io
        # When CUSTOM_DOMAIN secret is set, this step writes it to out/CNAME
        # so GitHub Pages serves the site at that domain automatically.
        # NOTE: GitHub Actions does not allow the `secrets` context inside `if:`,
        # so we route the secret through an env var and test that instead.
        env:
          CUSTOM_DOMAIN: ${{ secrets.CUSTOM_DOMAIN }}
        if: env.CUSTOM_DOMAIN != ''
        run: echo "$CUSTOM_DOMAIN" > out/CNAME

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
