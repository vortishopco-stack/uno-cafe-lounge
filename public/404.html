<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Uno Cafe' Lounge - Loyalty & Rewards</title>
  <script>
    // GitHub Pages SPA redirect: If the page is accessed directly (not via the root),
    // redirect to the root so the React app can handle routing.
    // This script handles the case where GitHub Pages serves 404.html for unknown paths.
    var pathSegmentsToKeep = 1; // Keep 1 segment for username.github.io/repo
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
      l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body>
  <p>Redirecting...</p>
</body>
</html>
