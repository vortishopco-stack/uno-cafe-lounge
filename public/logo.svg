<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="cup" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#d97706"/>
      <stop offset="1" stop-color="#92400e"/>
    </linearGradient>
    <linearGradient id="lid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f59e0b"/>
      <stop offset="1" stop-color="#b45309"/>
    </linearGradient>
    <linearGradient id="steam" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#fcd34d" stop-opacity="0"/>
      <stop offset="1" stop-color="#fcd34d" stop-opacity="0.9"/>
    </linearGradient>
  </defs>

  <!-- Steam -->
  <path d="M26 14 c-3 3 -3 6 0 9 c3 3 3 6 0 9" stroke="url(#steam)" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.8"/>
  <path d="M34 12 c-3 3 -3 6 0 9 c3 3 3 6 0 9" stroke="url(#steam)" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.6"/>
  <path d="M42 14 c-3 3 -3 6 0 9 c3 3 3 6 0 9" stroke="url(#steam)" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.7"/>

  <!-- Lid -->
  <rect x="14" y="26" width="36" height="5" rx="2.5" fill="url(#lid)"/>
  <rect x="14" y="26" width="36" height="2" rx="1" fill="#fde68a" opacity="0.6"/>

  <!-- Cup body -->
  <path d="M16 31 h32 l-2.5 22 a4 4 0 0 1 -4 3.6 h-19 a4 4 0 0 1 -4 -3.6 z" fill="url(#cup)"/>

  <!-- Cup sleeve / label band -->
  <rect x="18" y="38" width="28" height="9" rx="1.5" fill="#78350f" opacity="0.55"/>
  <text x="32" y="44.5" font-family="Georgia, serif" font-size="6.5" font-weight="700" fill="#fde68a" text-anchor="middle" letter-spacing="0.5">UNO</text>

  <!-- Handle -->
  <path d="M48 34 h5 a5 5 0 0 1 0 10 h-5" stroke="url(#lid)" stroke-width="3.2" fill="none" stroke-linecap="round"/>

  <!-- Highlight -->
  <path d="M20 34 q-1 11 1.5 19" stroke="#fef3c7" stroke-width="1.5" stroke-linecap="round" opacity="0.35" fill="none"/>
</svg>
